<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Principal Leave Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen">

<div class="flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-6xl grid md:grid-cols-3 rounded-3xl shadow-2xl overflow-hidden backdrop-blur-lg bg-white/70">

    <!-- PROFILE SECTION -->
    <div class="bg-gradient-to-br from-indigo-600 to-blue-700 text-white p-8 flex flex-col items-center justify-center relative">

      <div class="absolute top-4 right-4 bg-white/20 px-3 py-1 rounded-full text-xs">
        Principal
      </div>

      <img src="https://via.placeholder.com/130"
           class="w-32 h-32 rounded-full border-4 border-white shadow-xl mb-5">

      <h2 class="text-2xl font-bold">Sapna Arzare</h2>
      <p class="text-sm opacity-90 mt-1">Principal</p>
      <p class="text-sm opacity-80">SDITS College</p>

      <div class="mt-6 text-sm text-center space-y-2">
        <p>📧 sapna@sdits.edu</p>
        <p>📞 +91 9876543210</p>
      </div>

      <div class="mt-6 bg-white/20 px-4 py-2 rounded-lg text-xs">
        Academic Head
      </div>
    </div>

    <!-- FORM SECTION -->
    <div class="md:col-span-2 p-10">

      <h1 class="text-3xl font-bold text-gray-800 mb-2">
        Principal Leave Application
      </h1>
      <p class="text-gray-500 mb-8">
        Submit your leave request for approval by management.
      </p>

      <form class="space-y-6">

        <!-- Leave Type -->
        <div>
          <label class="text-sm font-medium text-gray-600">Leave Type</label>
          <select class="w-full mt-2 p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
            <option>Casual Leave</option>
            <option>Medical Leave</option>
            <option>Official Duty</option>
            <option>Emergency Leave</option>
          </select>
        </div>

        <!-- Dates -->
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-gray-600">From Date</label>
            <input type="date" class="w-full mt-2 p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400">
          </div>

          <div>
            <label class="text-sm text-gray-600">To Date</label>
            <input type="date" class="w-full mt-2 p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400">
          </div>
        </div>

        <!-- Reason -->
        <div>
          <label class="text-sm text-gray-600">Reason for Leave</label>
          <textarea rows="4"
            class="w-full mt-2 p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400"
            placeholder="Enter detailed reason..."></textarea>
        </div>

        <!-- Delegation -->
        <div>
          <label class="text-sm text-gray-600">Assign Responsibility</label>
          <input type="text"
            class="w-full mt-2 p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400"
            placeholder="Assign duties to...">
        </div>

        <!-- Attachment -->
        <div>
          <label class="text-sm text-gray-600">Attach Document</label>
          <input type="file" class="w-full mt-2">
        </div>

        <!-- Buttons -->
        <div class="flex gap-4">
          <button type="submit"
            class="flex-1 bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg">
            Submit Request
          </button>

          <button type="reset"
            class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl hover:bg-gray-300 transition">
            Reset
          </button>
        </div>

      </form>

    </div>

  </div>

</div>

</body>
</html>
