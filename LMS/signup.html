<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registration Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
              /* background: linear-gradient(to right, #6dd5ed, #2193b0); */
               background: linear-gradient(to right,  #7c3aed , #4338ca);
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }
        .form-checkbox:checked {
            background-color: #4f46e5;
        }
        .password-strength-meter {
            height: 4px;
            background-color: #e5e7eb;
            margin-top: 4px;
            border-radius: 2px;
        }
        .password-strength-meter-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .department-icon {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            color: #4f46e5;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="w-full max-w-md mx-auto p-6">
        <div class="gradient-bg text-white p-6 rounded-t-lg text-center">
            <img src=" sdits.jpg" alt="University logo with an academic shield design in blue and gold colors" class="mx-auto h-16 w-16 rounded-full mb-4">
            <h1 class="text-2xl font-bold">University Portal</h1>
            <p class="text-indigo-100 mt-2">Create your academic account</p>
        </div>

        <div class="bg-white shadow-lg rounded-b-lg px-8 py-8">
            <form id="registrationForm" action="connect.php" method="POST">
                <!-- id Field -->
                <div class="mb-6">
                    <label for="faculty_id" class="block text-sm font-medium text-gray-700 mb-1">Faculty ID</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-user"></i>
                        <input type="text" id="faculty_id" name="faculty_id" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="0411@shraddhapaliwal">
                    </div>
                </div>
                <!-- Name Field -->
                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-user"></i>
                        <input type="text" id="name" name="name" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="shraddha paliwal">
                    </div>
                </div>

                <!-- Email Field -->
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="shraddha mem@sditsuniversity.edu">
                    </div>
                </div>

                <!-- Phone Field -->
                <div class="mb-6">
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="+1 (555) 123-4567">
                    </div>
                </div>

                <!-- Department Field -->
                <div class="mb-6">
                    <label for="department" class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-graduation-cap"></i>
                        <select id="department" name="department" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none">
                            <option value="" disabled selected>Select your department</option>
                            <option value="computer_science">Computer Science</option>
                            <option value="data_science">Data Science</option>
                            <option value="mba">MBA</option>
                            <option value="mca">MCA</option>
                            <option value="maths">Mathematics</option>
                            <option value="mechanical">Mechanical Engineering</option>
                        </select>
                    </div>
                </div>

                <!-- Role Field -->
                <div class="mb-6">
                    <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-user-tie"></i>
                        <select id="role" name="role" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none">
                            <option value="" disabled selected>Select your role</option>
                            <option value="faculty">Faculty</option>
                            <option value="hod">HOD (Head of Department)</option>
                            <option value="principal">Principal</option>
                        </select>
                    </div>
                </div>

                <!-- Password Field with Strength Meter -->
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-lock"></i>
                        <input type="password" id="password" name="password" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="Create password">
                    </div>
                    <div class="password-strength-meter mt-1">
                        <div id="password-strength" class="password-strength-meter-fill w-0"></div>
                    </div>
                    <div id="password-hints" class="text-xs text-gray-500 mt-1">
                        <ul class="list-disc pl-4 space-y-1">
                            <li class="password-requirement" data-rule="length">At least 8 characters</li>
                            <li class="password-requirement" data-rule="uppercase">One uppercase letter</li>
                            <li class="password-requirement" data-rule="number">One number</li>
                            <li class="password-requirement" data-rule="special">One special character</li>
                        </ul>
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="mb-6">
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <div class="input-group">
                        <i class="input-icon fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="Confirm password">
                    </div>
                   

                <!-- Terms Checkbox -->
                <div class="mb-6">
                    <div class="flex items-center">
                        <input id="terms" name="terms" type="checkbox" required
                            class="h-4 w-4 form-checkbox rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        <label for="terms" class="ml-2 block text-sm text-gray-700">
                            I agree to the <a href="#" class="text-indigo-600 hover:text-indigo-500">terms and conditions</a>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full gradient-bg text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                    Create Account
                </button>

                <!-- Login Link -->
                <div class="mt-4 text-center text-sm text-gray-600">
                    Already have an account? <a href="#" class="text-indigo-600 hover:text-indigo-500">Log in</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordMatchError = document.getElementById('password-match-error');
            const passwordStrength = document.getElementById('password-strength');
            const passwordHints = document.querySelectorAll('.password-requirement');

            // Password strength checker
            passwordInput.addEventListener('input', function() {
                const password = passwordInput.value;
                let strength = 0;
                
                // Check password against rules
                const rules = {
                    length: password.length >= 8,
                    uppercase: /[A-Z]/.test(password),
                    number: /[0-9]/.test(password),
                    special: /[^A-Za-z0-9]/.test(password)
                };
                
                // Update strength meter
                let fulfilledRules = 0;
                passwordHints.forEach(hint => {
                    const rule = hint.getAttribute('data-rule');
                    if (rules[rule]) {
                        hint.style.color = '#10b981';
                        fulfilledRules++;
                    } else {
                        hint.style.color = '#6b7280';
                    }
                });
                
                // Calculate strength percentage
                const strengthPercent = (fulfilledRules / passwordHints.length) * 100;
                passwordStrength.style.width = strengthPercent + '%';
                
                // Update color based on strength
                if (strengthPercent <= 25) {
                    passwordStrength.style.backgroundColor = '#ef4444'; // red
                } else if (strengthPercent <= 50) {
                    passwordStrength.style.backgroundColor = '#f59e0b'; // yellow
                } else if (strengthPercent <= 75) {
                    passwordStrength.style.backgroundColor = '#3b82f6'; // blue
                } else {
                    passwordStrength.style.backgroundColor = '#10b981'; // green
                }
            });

            // Password match checker
            confirmPasswordInput.addEventListener('input', function() {
                if (passwordInput.value !== confirmPasswordInput.value) {
                    passwordMatchError.classList.remove('hidden');
                } else {
                    passwordMatchError.classList.add('hidden');
                }
            });

            // Form submission handler
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Validate passwords match
                if (passwordInput.value !== confirmPasswordInput.value) {
                    passwordMatchError.classList.remove('hidden');
                    return;
                }
                
                // Validate all fields are filled
                const inputs = form.querySelectorAll('[required]');
                let isValid = true;
                inputs.forEach(input => {
                    if (!input.value.trim()) {
                        isValid = false;
                    }
                });
                
                if (!isValid) {
                    alert('Please fill in all required fields');
                    return;
                }
                
                // Form is valid - proceed with submission
                //alert('Registration successful! Redirecting to dashboard...');
                // In a real application, you would submit the form here
                form.submit();
            });
        });
    </script>
</body>
</html>
